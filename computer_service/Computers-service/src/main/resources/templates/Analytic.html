<!DOCTYPE html>
<html style="font-size: 16px;" lang="ru">
<head>
    <title>Аналитика инфраструктуры</title>
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link id="u-theme-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:100,100i,300,300i,400,400i,500,500i,700,700i,900,900i|Open+Sans:300,300i,400,400i,500,500i,600,600i,700,700i,800,800i">
    <link id="u-page-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto+Slab:100,200,300,400,500,600,700,800,900">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .u-header {
            position: relative;
            z-index: 1001 !important;
        }

        .analytics-wrapper {
            position: relative;
            width: 100%;
            height: calc(100vh - 80px); /* Высота минус хедер */
            overflow: auto;
            background: white;
            clear: both;
        }

        .analytics-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Адаптация под мобильные */
        @media (max-width: 768px) {
            .analytics-wrapper {
                height: calc(100vh - 120px);
            }
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1002;
            transition: opacity 0.3s;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e88e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Фикс для футера */
        .u-footer {
            position: relative;
            z-index: 1000;
            clear: both;
        }
        /* Скрываем плашку Metabase */
        .analytics-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .analytics-wrapper {
            position: relative;
        }

        .analytics-iframe {
            margin-bottom: -40px; /* Сдвигаем вверх */
            height: calc(100% + 40px);
        }
    </style>
</head>
<body data-path-to-root="./" data-include-products="false" class="u-body u-stick-footer u-xl-mode" data-lang="ru">
<header class="u-clearfix u-header u-palette-1-base u-header" id="Header">
    <div class="u-clearfix u-sheet u-sheet-1">
        <a class="u-align-left u-image u-logo u-image-1" data-image-width="150" data-image-height="109" title="Computers">
            <img th:src="@{/images/logo.png}" class="u-logo-image u-logo-image-1">
        </a>
        <h3 class="style u-align-center u-custom-font u-font-roboto-slab u-headline u-text u-text-default u-text-1">
            <a class="u-active-none u-border-none u-btn u-button-link u-button-style u-hover-none u-none u-text-body-alt-color u-btn-1">Система учета компьютерного обеспечения</a>
        </h3>
        <span class="u-file-icon u-icon u-text-white u-icon-1" th:href="@{/logout}">
            <img th:src="@{/images/515094-b2d97c4b.png}" alt="">
        </span>
        <nav class="u-menu u-menu-one-level u-offcanvas u-menu-1">
            <div class="u-custom-menu u-nav-container">
                <ul class="u-nav u-unstyled">
                    <li class="u-nav-item"><a class="u-button-style u-nav-link" th:href="@{/computers}">Компьютеры</a></li>
                    <li class="u-nav-item"><a class="u-button-style u-nav-link" th:href="@{/laptops}">Ноутбуки</a></li>
                    <li class="u-nav-item"><a class="u-button-style u-nav-link" th:href="@{/software}">Программное обеспечение</a></li>
                    <li class="u-nav-item"><a class="u-button-style u-nav-link" th:href="@{/peripherals}">Периферия</a></li>
                    <li class="u-nav-item"><a class="u-button-style u-nav-link" th:href="@{/analytic}">Аналитика</a></li>
                </ul>
            </div>
        </nav>
    </div>
</header>

<div class="analytics-wrapper">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>
    <iframe
            id="analyticsFrame"
            class="analytics-iframe"
            src="http://localhost:3001/public/dashboard/a6e3fc27-fd15-4919-80b5-3e2d9e18e9e3?bordered=false&titled=false&logo=false&nav=false&hide_parameters=true&font=default"
            title="Metabase Dashboard"
            allow="fullscreen"
            onload="hideLoading()">
    </iframe>
</div>

<footer class="u-clearfix u-footer u-palette-1-base" id="Footer">
    <div class="u-clearfix u-sheet u-sheet-1">
        <p class="u-align-center u-text u-text-default u-text-1">Ростов-На-Дону, 2026г.</p>
    </div>
</footer>

<script type="text/javascript">
    function hideLoading() {
        var overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(function() {
                overlay.style.display = 'none';
            }, 300);
        }
    }

    setTimeout(function() {
        hideLoading();
    }, 5000);
</script>
</body>
</html>
